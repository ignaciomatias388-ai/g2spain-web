name: G2Spain — Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Validar calidad del código
  # ─────────────────────────────────────────
  validate:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar archivos obligatorios
        run: |
          echo "Verificando archivos del proyecto..."
          for f in index.html robots.txt sitemap.xml; do
            if [ -f "$f" ]; then
              echo "✅  $f — OK"
            else
              echo "❌  $f — FALTA"
              exit 1
            fi
          done

      - name: Validar HTML (estructura y etiquetas)
        run: |
          python3 - << 'PYEOF'
          from html.parser import HTMLParser

          class HTMLValidator(HTMLParser):
              VOID = {
                  'area','base','br','col','embed','hr','img','input',
                  'link','meta','param','source','track','wbr'
              }
              def __init__(self):
                  super().__init__()
                  self.errors = []
                  self.stack  = []

              def handle_starttag(self, tag, attrs):
                  if tag not in self.VOID:
                      self.stack.append(tag)

              def handle_endtag(self, tag):
                  if tag in self.VOID:
                      return
                  if self.stack and self.stack[-1] == tag:
                      self.stack.pop()
                  else:
                      self.errors.append(f'Etiqueta inesperada: </{tag}>')

          v = HTMLValidator()
          with open('index.html', encoding='utf-8') as f:
              v.feed(f.read())

          if v.errors:
              print(f'❌  Errores HTML: {v.errors[:5]}')
              exit(1)
          if v.stack:
              print(f'❌  Etiquetas sin cerrar: {v.stack[-5:]}')
              exit(1)

          print('✅  HTML válido — sin errores')
          PYEOF

      - name: Verificar Formspree configurado
        run: |
          if grep -q "FORMSPREE_ID" index.html; then
            echo "❌  Formspree no está configurado (contiene FORMSPREE_ID)"
            exit 1
          fi
          echo "✅  Formspree configurado correctamente"

      - name: Verificar viewport meta (mobile)
        run: |
          if grep -q 'name="viewport"' index.html; then
            echo "✅  Viewport meta presente"
          else
            echo "❌  Viewport meta ausente — necesario para responsive"
            exit 1
          fi

      - name: Verificar SEO básico
        run: |
          python3 - << 'PYEOF'
          import re

          with open('index.html', encoding='utf-8') as f:
              html = f.read()

          checks = {
              'title':       bool(re.search(r'<title>[^<]+</title>', html)),
              'description': bool(re.search(r'name="description"', html)),
              'canonical':   bool(re.search(r'rel="canonical"', html)),
              'og:title':    bool(re.search(r'og:title', html)),
              'h1':          bool(re.search(r'<h1', html)),
          }

          all_ok = True
          for tag, ok in checks.items():
              status = '✅' if ok else '⚠️ '
              print(f'{status}  SEO: {tag}')
              if not ok:
                  all_ok = False

          if not all_ok:
              print('Algunos elementos SEO faltan — revisa antes de publicar')
          else:
              print('✅  SEO básico completo')
          PYEOF

      - name: Resumen de validación
        run: |
          SIZE=$(wc -c < index.html)
          echo "──────────────────────────────────────"
          echo "  Proyecto: G2Spain Auto"
          echo "  Archivo:  index.html ($SIZE bytes)"
          echo "  Estado:   ✅ Listo para deploy"
          echo "──────────────────────────────────────"

  # ─────────────────────────────────────────
  # JOB 2: Confirmar deploy (solo en main)
  # ─────────────────────────────────────────
  deploy-info:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Confirmar deploy automático
        run: |
          echo "──────────────────────────────────────"
          echo "  🚀  Deploy disparado automáticamente"
          echo ""
          echo "  Repositorio: ignaciomatias388-ai/g2spain-web"
          echo "  Rama:        main"
          echo "  Commit:      ${{ github.sha }}"
          echo "  Autor:       ${{ github.actor }}"
          echo ""
          echo "  Vercel detecta el push via GitHub App"
          echo "  y publica en < 30 segundos en:"
          echo "  https://g2spain-clean.vercel.app"
          echo "──────────────────────────────────────"
